name: Release

# Versionado/publicación gestionados con Changesets.
# Al mergear a main, si hay changesets pendientes se abre/actualiza un PR
# "Version Packages". Cuando ese PR se mergea, se publica a npm desde dist/.
#
# Requiere el secret NPM_TOKEN (automation token de npm con permiso de publish
# sobre el paquete). Hasta que exista, el job de publish no corre.

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci

      # Aplica los changesets pendientes (bump + changelog) en un PR,
      # o si ya no quedan changesets, publica el dist/ a npm.
      # Version-only: Changesets manages the version bump (via its PR); publishing
      # to npm stays a deliberate, manual step (no auto-publish). Re-add a
      # `publish:` line + NPM_TOKEN when you want CI to publish.
      - name: Version packages (Changesets)
        uses: changesets/action@v1
        with:
          version: npm run version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
